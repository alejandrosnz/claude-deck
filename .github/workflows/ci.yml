name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

jobs:
  check:
    name: Typecheck, lint & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: com.claudedeck.sdPlugin/package-lock.json

      - name: Install dependencies
        working-directory: com.claudedeck.sdPlugin
        run: npm ci

      - name: Typecheck
        working-directory: com.claudedeck.sdPlugin
        run: npm run typecheck

      - name: Lint
        working-directory: com.claudedeck.sdPlugin
        run: npm run lint

      - name: Build
        working-directory: com.claudedeck.sdPlugin
        run: npm run build

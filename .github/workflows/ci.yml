name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [master]

jobs:
  check:
    name: Typecheck, lint & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: com.claudedeck.sdPlugin/package-lock.json

      - name: Install dependencies
        working-directory: com.claudedeck.sdPlugin
        run: npm ci

      - name: Typecheck
        working-directory: com.claudedeck.sdPlugin
        run: npm run typecheck

      - name: Lint
        working-directory: com.claudedeck.sdPlugin
        run: npm run lint

      - name: Test
        working-directory: com.claudedeck.sdPlugin
        run: npm test

      # Push to master: plain build, no artifact.
      - name: Build
        if: github.event_name != 'pull_request'
        working-directory: com.claudedeck.sdPlugin
        run: npm run build

      # PRs: patch the root package.json version to X.Y.Z-betaNNN so that
      # `npm run package` picks it up, syncs manifest.json, builds, and zips.
      - name: Patch beta version
        if: github.event_name == 'pull_request'
        id: beta
        run: |
          BASE=$(node -p "require('./package.json').version")
          BETA="${BASE}-beta${{ github.event.pull_request.number }}"
          BETA_VERSION="$BETA" node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.BETA_VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "version=${BETA}" >> "$GITHUB_OUTPUT"
          echo "package.json version => ${BETA}"

      - name: Package beta bundle
        if: github.event_name == 'pull_request'
        run: npm run package

      - name: Upload beta artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: claude-deck-v${{ steps.beta.outputs.version }}
          path: claude-deck-v${{ steps.beta.outputs.version }}.streamDeckPlugin
          retention-days: 14
